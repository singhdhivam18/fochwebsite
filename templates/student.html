{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS</title>
    <link rel="stylesheet" href="{% static 'style_record.css' %}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Student Management System</h1>
            <nav>
                <a href="#dashboard">Dashboard</a>
            </nav>
        </header>

        <h2 class="main-heading">All Student Records</h2>

        <div id="studentRecordsContainer">
            <!-- Student records will be dynamically added here -->
        </div>
    </div>

    <!-- Modal for Student Details -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Student Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="studentForm">
                <!-- Form content will be dynamically generated -->
            </form>
        </div>
    </div>

    <!-- Modal for Manage Expenses -->
    <div id="expenseModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2 id="expenseModalTitle">Manage Expenses</h2>
                <button class="close-btn" onclick="closeExpenseModal()">&times;</button>
            </div>
            <form id="expenseForm">
                <div class="form-section">
                    <div class="form-group full-width">
                        <label for="expenseAmount">Amount</label>
                        <input type="number" id="expenseAmount" name="amount" placeholder="Enter amount" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="paymentMode">Mode of Payment</label>
                        <select id="paymentMode" name="mode_of_payment" required>
                            <option value="">Select payment mode</option>
                            <option value="Cash">Cash</option>
                            <option value="Cheque">Cheque</option>
                            <option value="UPI">UPI</option>
                        </select>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="expenseRemark">Remark</label>
                        <textarea id="expenseRemark" name="remark" placeholder="Enter remarks (optional)" rows="4"></textarea>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label for="expenseReceipt">Upload Receipt (JPG/PNG/PDF, Max 5MB)</label>
                    <input type="file" 
                           id="expenseReceipt" 
                           accept="image/jpeg,image/png,image/jpg,application/pdf"
                           onchange="previewExpenseReceipt(event)">
                    <div id="receiptPreview" class="file-preview"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="modal-btn save-btn" onclick="saveExpense()">Save Expense</button>
                    <button type="button" class="modal-btn cancel-btn" onclick="closeExpenseModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

<script src="{% static 'script_record.js' %}"></script>
</body>
</html>
